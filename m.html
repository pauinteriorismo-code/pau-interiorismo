<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PAU · Móvil</title>
<style>
:root{--bg:#0b1220;--card:#121a2c;--soft:#1a2540;--text:#e6ecff;--mut:#9aa6c4;--ln:#26314f;--blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--navy:#1e3a8a}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:15px/1.4 -apple-system,system-ui,sans-serif;overscroll-behavior:none}
body{padding-bottom:70px;padding-top:env(safe-area-inset-top)}
header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--ln);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;padding-top:calc(10px + env(safe-area-inset-top))}
header h1{font-size:16px;margin:0;font-weight:700}
header .who{font-size:11px;color:var(--mut)}
nav.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--ln);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
nav.tabs button{flex:1;background:none;border:0;color:var(--mut);padding:10px 4px 12px;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px}
nav.tabs button.on{color:var(--blue)}
nav.tabs .ic{font-size:20px}
main{padding:12px 14px}
.card{background:var(--card);border:1px solid var(--ln);border-radius:10px;padding:12px;margin-bottom:10px}
.card h3{margin:0 0 8px;font-size:14px}
.row{display:flex;gap:8px;align-items:center}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:var(--soft);color:var(--mut)}
.pill.red{background:#3a1a1f;color:#fca5a5}
.pill.amber{background:#3a2a14;color:#fcd34d}
.pill.green{background:#0f2e22;color:#6ee7b7}
.pill.blue{background:#0f1f3a;color:#93c5fd}
input,select,textarea,button{font:inherit;color:inherit}
input,select,textarea{width:100%;background:var(--soft);border:1px solid var(--ln);border-radius:8px;padding:10px;color:var(--text);font-size:16px}
textarea{min-height:70px;resize:vertical}
label{display:block;font-size:12px;color:var(--mut);margin:8px 0 4px}
.btn{display:inline-block;padding:11px 14px;border-radius:8px;border:0;background:var(--blue);color:#fff;font-weight:600;font-size:14px;cursor:pointer}
.btn.gray{background:var(--soft);color:var(--text)}
.btn.green{background:var(--green)}
.btn.red{background:var(--red)}
.btn.full{width:100%}
.fab{position:fixed;right:16px;bottom:80px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:0;font-size:28px;box-shadow:0 4px 16px rgba(59,130,246,.5);z-index:15}
.empty{text-align:center;color:var(--mut);padding:30px 10px;font-size:13px}
.list-item{background:var(--card);border:1px solid var(--ln);border-radius:10px;padding:11px;margin-bottom:8px}
.list-item .t{font-weight:600;font-size:14px}
.list-item .s{font-size:12px;color:var(--mut);margin-top:3px}
.list-item .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.modal .body{background:var(--bg);width:100%;max-height:92vh;border-radius:14px 14px 0 0;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal h2{margin:0 0 10px;font-size:16px}
.modal .actions{display:flex;gap:8px;margin-top:14px}
.modal .actions .btn{flex:1}
#toast{position:fixed;bottom:90px;left:14px;right:14px;background:#1e293b;color:#fff;padding:12px;border-radius:10px;text-align:center;font-size:13px;z-index:200;display:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}
#toast.on{display:block}
#toast.err{background:#7f1d1d}
#toast.ok{background:#065f46}
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;justify-content:center;padding:24px;z-index:300}
#login h1{text-align:center;margin:0 0 4px;font-size:22px}
#login .sub{text-align:center;color:var(--mut);font-size:13px;margin-bottom:24px}
.search{margin-bottom:10px}
.tag{font-size:10px;background:var(--soft);padding:2px 6px;border-radius:4px;color:var(--mut)}
details{background:var(--card);border:1px solid var(--ln);border-radius:10px;padding:10px 12px;margin-bottom:8px}
details summary{font-weight:600;font-size:14px;cursor:pointer;outline:none}
details[open] summary{margin-bottom:8px}
.kv{font-size:12px;color:var(--mut);margin:3px 0}
.kv b{color:var(--text);font-weight:500}
.linkfull{display:block;text-align:center;color:var(--mut);font-size:11px;padding:14px;text-decoration:none}
</style>
</head>
<body>

<div id="login">
  <h1>PAU Interiorismo</h1>
  <div class="sub">Versión móvil ligera</div>
  <label>Usuario</label>
  <input id="lu" autocapitalize="off" autocorrect="off" placeholder="jose / pau / sergi">
  <label>Contraseña</label>
  <input id="lp" type="password">
  <div style="height:14px"></div>
  <button class="btn full" onclick="doLogin()">Entrar</button>
  <div id="le" style="color:var(--red);text-align:center;margin-top:10px;font-size:12px;display:none"></div>
  <a href="?full=1" class="linkfull">Ver versión completa (puede ir lenta o fallar)</a>
</div>

<header>
  <h1 id="title">Inicio</h1>
  <div class="row">
    <span class="who" id="whoami"></span>
    <button class="btn gray" style="padding:6px 10px;font-size:11px;margin-left:8px" onclick="logout()">Salir</button>
  </div>
</header>

<main id="main"></main>

<button class="fab" id="fab" onclick="onFab()" style="display:none">＋</button>

<nav class="tabs">
  <button id="tb-inicio"  class="on" onclick="go('inicio')"><span class="ic">🏠</span>Inicio</button>
  <button id="tb-agenda"  onclick="go('agenda')"><span class="ic">📅</span>Agenda</button>
  <button id="tb-plan"    onclick="go('plan')"><span class="ic">🗓</span>Planning</button>
  <button id="tb-proy"    onclick="go('proy')"><span class="ic">📁</span>Proyectos</button>
  <button id="tb-cli"     onclick="go('cli')"><span class="ic">👥</span>Clientes</button>
</nav>

<div id="toast"></div>

<!-- Modal Agenda -->
<div class="modal" id="m-ag" onclick="if(event.target===this)closeM('m-ag')">
  <div class="body">
    <h2 id="ag-h">Nuevo aviso</h2>
    <input type="hidden" id="ag-id">
    <label>Descripción</label>
    <input id="ag-desc" placeholder="Llamar a cliente, reunión...">
    <label>Fecha</label>
    <input id="ag-fecha" type="date">
    <label>Hora (opcional)</label>
    <input id="ag-hora" type="time">
    <label>Tipo</label>
    <select id="ag-tipo">
      <option>Reunión</option><option>Llamada</option><option>Visita</option>
      <option>Tarea</option><option>Pago</option><option>Otro</option>
    </select>
    <label>Prioridad</label>
    <select id="ag-prio"><option value="normal">Normal</option><option value="alta">Alta</option><option value="baja">Baja</option></select>
    <label>Proyecto (opcional)</label>
    <select id="ag-proy"><option value="">—</option></select>
    <label>Notas</label>
    <textarea id="ag-notas"></textarea>
    <div class="actions">
      <button class="btn gray" onclick="closeM('m-ag')">Cancelar</button>
      <button class="btn red" id="ag-del" style="display:none" onclick="agDelete()">Eliminar</button>
      <button class="btn" onclick="agSave()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal Planning -->
<div class="modal" id="m-pl" onclick="if(event.target===this)closeM('m-pl')">
  <div class="body">
    <h2 id="pl-h">Nueva tarea</h2>
    <input type="hidden" id="pl-id">
    <label>Título</label>
    <input id="pl-tit">
    <label>Fecha inicio</label>
    <input id="pl-fi" type="date">
    <label>Fecha fin</label>
    <input id="pl-ff" type="date">
    <label>Proyecto (opcional)</label>
    <select id="pl-proy"><option value="">—</option></select>
    <label>Prioridad</label>
    <select id="pl-prio"><option value="normal">Normal</option><option value="alta">Alta</option><option value="baja">Baja</option></select>
    <label>Estado</label>
    <select id="pl-est">
      <option value="Pendiente">Pendiente</option>
      <option value="En curso">En curso</option>
      <option value="Completado">Completado</option>
      <option value="Pausada">Pausada</option>
    </select>
    <label>Notas</label>
    <textarea id="pl-notas"></textarea>
    <div class="actions">
      <button class="btn gray" onclick="closeM('m-pl')">Cancelar</button>
      <button class="btn red" id="pl-del" style="display:none" onclick="plDelete()">Eliminar</button>
      <button class="btn" onclick="plSave()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// PAU Móvil — versión ligera para iPhone
// ════════════════════════════════════════
const SB_URL='https://qxyflndntpmcdbyvwjnj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4eWZsbmRudHBtY2RieXZ3am5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjgzOTMsImV4cCI6MjA4NzUwNDM5M30.WQ193I6oS9ANMvuWG8XXa_J6oFleoTSlLQKeFVR_d50';
const PASSWDS={'jose':'cGF1MjAyNg==','pau':'cGF1MjAyNg==','sergi':'c2VyZ2kyMDI2'};

// Estado global mínimo
let CUR='inicio';
let AG=[], PL=[], PROY=[], CLI=[];
let LOADED={ag:0,pl:0,proy:0,cli:0};

// ── Toast ──
let _tT;
function toast(msg,kind='ok'){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.className='on '+(kind==='err'?'err':'ok');
  clearTimeout(_tT);
  _tT=setTimeout(()=>{t.className='';},2400);
}

// ── Errores globales: protegidos contra recursión ──
let _inErr=false;
window.addEventListener('error',e=>{
  if(_inErr)return; _inErr=true;
  try{ console.error('[err]',e.message); }catch(_){ }
  _inErr=false;
});
window.addEventListener('unhandledrejection',e=>{
  if(_inErr)return; _inErr=true;
  try{ console.error('[rej]',e.reason); }catch(_){ }
  _inErr=false;
});

// ── Supabase REST ──
async function sb(table,method='GET',body=null,extra=''){
  const url=`${SB_URL}/rest/v1/${table}${extra}`;
  const headers={'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`};
  if(body){headers['Content-Type']='application/json';headers['Prefer']='return=representation';}
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),25000);
  try{
    const r=await fetch(url,{method,headers,body:body?JSON.stringify(body):undefined,mode:'cors',credentials:'omit',signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok) throw new Error((await r.text()).slice(0,200));
    const t=await r.text();
    return t?JSON.parse(t):[];
  }catch(e){
    clearTimeout(tid);
    if(e.name==='AbortError') throw new Error('Tiempo agotado');
    throw e;
  }
}

// ── Login ──
function doLogin(){
  const u=(document.getElementById('lu').value||'').trim().toLowerCase();
  const p=document.getElementById('lp').value||'';
  const e=document.getElementById('le');
  if(!PASSWDS[u]){ e.textContent='Usuario no reconocido'; e.style.display='block'; return; }
  if(btoa(p)!==PASSWDS[u]){ e.textContent='Contraseña incorrecta'; e.style.display='block'; return; }
  localStorage.setItem('pau-m-user',u);
  startApp(u);
}
function logout(){
  localStorage.removeItem('pau-m-user');
  location.reload();
}
function startApp(u){
  document.getElementById('login').style.display='none';
  document.getElementById('whoami').textContent=u;
  go('inicio');
}

// ── Navegación ──
function go(v){
  CUR=v;
  ['inicio','agenda','plan','proy','cli'].forEach(k=>{
    const b=document.getElementById('tb-'+k);
    if(b) b.classList.toggle('on',k===v);
  });
  const titulos={inicio:'Inicio',agenda:'Agenda',plan:'Planning',proy:'Proyectos',cli:'Clientes'};
  document.getElementById('title').textContent=titulos[v];
  const fab=document.getElementById('fab');
  fab.style.display=(v==='agenda'||v==='plan')?'block':'none';
  if(v==='inicio') renderInicio();
  if(v==='agenda') loadAgenda();
  if(v==='plan')   loadPlan();
  if(v==='proy')   loadProy();
  if(v==='cli')    loadCli();
  window.scrollTo(0,0);
}
function onFab(){
  if(CUR==='agenda') openAg();
  if(CUR==='plan') openPl();
}

// ── Helpers ──
function fmtFecha(s){
  if(!s) return '—';
  try{ const [y,m,d]=s.split('-'); return `${d}/${m}/${y.slice(2)}`; }catch(_){ return s; }
}
function hoy(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Carga proyectos/clientes en cache si no estaban
async function ensureProy(){
  if(LOADED.proy) return;
  PROY=await sb('proyectos','GET',null,'?order=proyecto_id.desc').catch(()=>[]);
  LOADED.proy=1;
}
async function ensureCli(){
  if(LOADED.cli) return;
  CLI=await sb('clientes','GET',null,'?order=nombre.asc').catch(()=>[]);
  LOADED.cli=1;
}

// ════════════════════════════════════════
// VISTA: INICIO
// ════════════════════════════════════════
async function renderInicio(){
  const m=document.getElementById('main');
  m.innerHTML=`
    <div class="card"><h3>Hola 👋</h3>
      <div style="font-size:12px;color:var(--mut)">Versión móvil ligera. Solo lo esencial: agenda, planning y consulta. Si necesitas algo más, abre la app en el PC o iPad.</div>
    </div>
    <div class="card" id="card-resumen"><h3>📅 Próximo</h3><div class="empty">Cargando…</div></div>
    <a href="?full=1" class="linkfull">Abrir versión completa (puede ir lenta o fallar en iPhone)</a>
  `;
  try{
    if(!LOADED.ag){ AG=await sb('agenda','GET',null,'?order=fecha.asc,hora.asc'); LOADED.ag=1; }
    const h=hoy();
    const prox=AG.filter(a=>a&&a.estado!=='Completado'&&(a.fecha||'')>=h).slice(0,5);
    const c=document.getElementById('card-resumen');
    if(!prox.length){ c.innerHTML=`<h3>📅 Próximo</h3><div class="empty">Sin avisos pendientes</div>`; return; }
    c.innerHTML=`<h3>📅 Próximos avisos</h3>`+prox.map(a=>`
      <div class="list-item" onclick="openAg('${a.id}')">
        <div class="t">${esc(a.descripcion||'—')}</div>
        <div class="s">${fmtFecha(a.fecha)}${a.hora?' · '+a.hora:''} · ${esc(a.tipo||'')}</div>
      </div>`).join('');
  }catch(e){
    document.getElementById('card-resumen').innerHTML=`<h3>📅 Próximo</h3><div class="empty">Error: ${esc(e.message)}</div>`;
  }
}

// ════════════════════════════════════════
// VISTA: AGENDA
// ════════════════════════════════════════
async function loadAgenda(){
  const m=document.getElementById('main');
  m.innerHTML=`
    <div class="row" style="gap:6px;margin-bottom:10px">
      <select id="ag-filt" onchange="renderAgenda()">
        <option value="pend">Pendientes</option>
        <option value="hoy">Hoy</option>
        <option value="sem">Esta semana</option>
        <option value="todos">Todos</option>
        <option value="comp">Completados</option>
      </select>
    </div>
    <input class="search" id="ag-srch" placeholder="🔍 Buscar..." oninput="renderAgenda()">
    <div id="ag-list"><div class="empty">Cargando…</div></div>
  `;
  try{
    AG=await sb('agenda','GET',null,'?order=fecha.asc,hora.asc');
    LOADED.ag=1;
    renderAgenda();
  }catch(e){
    document.getElementById('ag-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}
function renderAgenda(){
  const filt=document.getElementById('ag-filt')?.value||'pend';
  const q=(document.getElementById('ag-srch')?.value||'').toLowerCase().trim();
  const h=hoy();
  const fin=new Date(); fin.setDate(fin.getDate()+7);
  const finS=fin.toISOString().slice(0,10);
  let items=(AG||[]).filter(a=>a&&typeof a==='object');
  if(filt==='pend') items=items.filter(a=>a.estado!=='Completado'&&(a.fecha||'')>=h);
  else if(filt==='hoy') items=items.filter(a=>a.fecha===h);
  else if(filt==='sem') items=items.filter(a=>(a.fecha||'')>=h&&(a.fecha||'')<=finS);
  else if(filt==='comp') items=items.filter(a=>a.estado==='Completado');
  if(q) items=items.filter(a=>((a.descripcion||'')+(a.notas||'')+(a.tipo||'')).toLowerCase().includes(q));
  const c=document.getElementById('ag-list');
  if(!items.length){ c.innerHTML='<div class="empty">Sin avisos</div>'; return; }
  c.innerHTML=items.map(a=>{
    const venc=(a.fecha||'')<h && a.estado!=='Completado';
    const esHoy=a.fecha===h;
    const pill=a.estado==='Completado'?'<span class="pill green">✓ Hecho</span>':
               venc?'<span class="pill red">⚠ Vencido</span>':
               esHoy?'<span class="pill amber">📅 Hoy</span>':
               '<span class="pill blue">Pendiente</span>';
    return `<div class="list-item" onclick="openAg('${a.id}')">
      <div class="t">${esc(a.descripcion||'—')}</div>
      <div class="s">${fmtFecha(a.fecha)}${a.hora?' · '+a.hora:''} · ${esc(a.tipo||'')}</div>
      ${a.notas?`<div class="s">${esc(a.notas)}</div>`:''}
      <div class="meta">${pill}
        ${a.estado!=='Completado'?`<span class="pill green" onclick="event.stopPropagation();agComplete('${a.id}')">✓ Completar</span>`:''}
      </div>
    </div>`;
  }).join('');
}
async function openAg(id){
  await ensureProy();
  const sel=document.getElementById('ag-proy');
  sel.innerHTML='<option value="">—</option>'+PROY.map(p=>`<option value="${esc(p.proyecto_id)}">${esc(p.proyecto_id)} · ${esc(p.nombre||'')}</option>`).join('');
  if(id){
    const a=AG.find(x=>x.id===id);
    if(!a) return;
    document.getElementById('ag-h').textContent='Editar aviso';
    document.getElementById('ag-id').value=a.id;
    document.getElementById('ag-desc').value=a.descripcion||'';
    document.getElementById('ag-fecha').value=a.fecha||'';
    document.getElementById('ag-hora').value=a.hora||'';
    document.getElementById('ag-tipo').value=a.tipo||'Reunión';
    document.getElementById('ag-prio').value=a.prioridad||'normal';
    document.getElementById('ag-proy').value=a.proyecto_id||'';
    document.getElementById('ag-notas').value=a.notas||'';
    document.getElementById('ag-del').style.display='block';
  } else {
    document.getElementById('ag-h').textContent='Nuevo aviso';
    document.getElementById('ag-id').value='';
    document.getElementById('ag-desc').value='';
    document.getElementById('ag-fecha').value=hoy();
    document.getElementById('ag-hora').value='';
    document.getElementById('ag-tipo').value='Reunión';
    document.getElementById('ag-prio').value='normal';
    document.getElementById('ag-proy').value='';
    document.getElementById('ag-notas').value='';
    document.getElementById('ag-del').style.display='none';
  }
  openM('m-ag');
}
async function agSave(){
  const desc=document.getElementById('ag-desc').value.trim();
  if(!desc){ toast('Falta descripción','err'); return; }
  const fecha=document.getElementById('ag-fecha').value;
  if(!fecha){ toast('Falta fecha','err'); return; }
  const id=document.getElementById('ag-id').value;
  const d={
    descripcion:desc, fecha,
    hora:document.getElementById('ag-hora').value||null,
    tipo:document.getElementById('ag-tipo').value,
    prioridad:document.getElementById('ag-prio').value,
    proyecto_id:document.getElementById('ag-proy').value||null,
    notas:document.getElementById('ag-notas').value||null,
    notificacion:true,
    estado:'Pendiente'
  };
  try{
    if(id){
      await sb('agenda','PATCH',d,`?id=eq.${id}`);
      toast('Actualizado ✓');
    } else {
      await sb('agenda','POST',d);
      toast('Guardado ✓');
    }
    closeM('m-ag');
    LOADED.ag=0;
    if(CUR==='agenda') loadAgenda(); else if(CUR==='inicio') renderInicio();
  }catch(e){ toast('Error: '+e.message,'err'); }
}
async function agDelete(){
  const id=document.getElementById('ag-id').value;
  if(!id) return;
  if(!confirm('¿Eliminar este aviso?')) return;
  try{
    await sb('agenda','DELETE',null,`?id=eq.${id}`);
    closeM('m-ag');
    LOADED.ag=0;
    if(CUR==='agenda') loadAgenda(); else renderInicio();
    toast('Eliminado');
  }catch(e){ toast('Error: '+e.message,'err'); }
}
async function agComplete(id){
  try{
    await sb('agenda','PATCH',{estado:'Completado'},`?id=eq.${id}`);
    const a=AG.find(x=>x.id===id); if(a) a.estado='Completado';
    renderAgenda();
    toast('Completado ✓');
  }catch(e){ toast('Error: '+e.message,'err'); }
}

// ════════════════════════════════════════
// VISTA: PLANNING
// ════════════════════════════════════════
async function loadPlan(){
  const m=document.getElementById('main');
  m.innerHTML=`
    <div class="row" style="gap:6px;margin-bottom:10px">
      <select id="pl-filt" onchange="renderPlan()">
        <option value="act">Activas</option>
        <option value="todas">Todas</option>
        <option value="comp">Completadas</option>
      </select>
    </div>
    <input class="search" id="pl-srch" placeholder="🔍 Buscar..." oninput="renderPlan()">
    <div id="pl-list"><div class="empty">Cargando…</div></div>
  `;
  try{
    PL=await sb('planning_tareas','GET',null,'?order=fecha_ini.asc');
    LOADED.pl=1;
    renderPlan();
  }catch(e){
    document.getElementById('pl-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}
function renderPlan(){
  const filt=document.getElementById('pl-filt')?.value||'act';
  const q=(document.getElementById('pl-srch')?.value||'').toLowerCase().trim();
  let items=(PL||[]).filter(t=>t&&typeof t==='object');
  if(filt==='act') items=items.filter(t=>t.estado!=='Completado');
  else if(filt==='comp') items=items.filter(t=>t.estado==='Completado');
  if(q) items=items.filter(t=>((t.titulo||'')+(t.proyecto_nombre||'')+(t.notas||'')).toLowerCase().includes(q));
  const c=document.getElementById('pl-list');
  if(!items.length){ c.innerHTML='<div class="empty">Sin tareas</div>'; return; }
  c.innerHTML=items.map(t=>{
    const pill=t.estado==='Completado'?'<span class="pill green">✓</span>':
               t.estado==='En curso'?'<span class="pill blue">En curso</span>':
               t.estado==='Pausada'?'<span class="pill amber">Pausada</span>':
               '<span class="pill">Pendiente</span>';
    const prio=t.prioridad==='alta'?'<span class="pill red">Alta</span>':'';
    return `<div class="list-item" onclick="openPl('${t.id}')">
      <div class="t">${esc(t.titulo||'—')}</div>
      <div class="s">${fmtFecha(t.fecha_ini)} → ${fmtFecha(t.fecha_fin)}</div>
      ${t.proyecto_nombre?`<div class="s">📁 ${esc(t.proyecto_nombre)}</div>`:''}
      <div class="meta">${pill}${prio}</div>
    </div>`;
  }).join('');
}
async function openPl(id){
  await ensureProy();
  const sel=document.getElementById('pl-proy');
  sel.innerHTML='<option value="">—</option>'+PROY.map(p=>`<option value="${esc(p.proyecto_id)}">${esc(p.proyecto_id)} · ${esc(p.nombre||'')}</option>`).join('');
  if(id){
    const t=PL.find(x=>x.id===id);
    if(!t) return;
    document.getElementById('pl-h').textContent='Editar tarea';
    document.getElementById('pl-id').value=t.id;
    document.getElementById('pl-tit').value=t.titulo||'';
    document.getElementById('pl-fi').value=t.fecha_ini||'';
    document.getElementById('pl-ff').value=t.fecha_fin||'';
    document.getElementById('pl-proy').value=t.proyecto_id||'';
    document.getElementById('pl-prio').value=t.prioridad||'normal';
    document.getElementById('pl-est').value=t.estado||'Pendiente';
    document.getElementById('pl-notas').value=t.notas||'';
    document.getElementById('pl-del').style.display='block';
  } else {
    document.getElementById('pl-h').textContent='Nueva tarea';
    document.getElementById('pl-id').value='';
    document.getElementById('pl-tit').value='';
    document.getElementById('pl-fi').value=hoy();
    document.getElementById('pl-ff').value=hoy();
    document.getElementById('pl-proy').value='';
    document.getElementById('pl-prio').value='normal';
    document.getElementById('pl-est').value='Pendiente';
    document.getElementById('pl-notas').value='';
    document.getElementById('pl-del').style.display='none';
  }
  openM('m-pl');
}
async function plSave(){
  const titulo=document.getElementById('pl-tit').value.trim();
  if(!titulo){ toast('Falta título','err'); return; }
  const fi=document.getElementById('pl-fi').value;
  const ff=document.getElementById('pl-ff').value;
  if(!fi||!ff){ toast('Faltan fechas','err'); return; }
  if(ff<fi){ toast('Fin anterior al inicio','err'); return; }
  const proyId=document.getElementById('pl-proy').value||null;
  const proyNom=proyId?(PROY.find(p=>p.proyecto_id===proyId)?.nombre||null):null;
  const d={
    titulo,
    fecha_ini:fi, fecha_fin:ff,
    proyecto_id:proyId, proyecto_nombre:proyNom,
    prioridad:document.getElementById('pl-prio').value,
    estado:document.getElementById('pl-est').value,
    notas:document.getElementById('pl-notas').value||null
  };
  const id=document.getElementById('pl-id').value;
  try{
    if(id){
      await sb('planning_tareas','PATCH',d,`?id=eq.${id}`);
      toast('Actualizada ✓');
    } else {
      await sb('planning_tareas','POST',d);
      toast('Creada ✓');
    }
    closeM('m-pl');
    LOADED.pl=0;
    if(CUR==='plan') loadPlan();
  }catch(e){ toast('Error: '+e.message,'err'); }
}
async function plDelete(){
  const id=document.getElementById('pl-id').value;
  if(!id) return;
  if(!confirm('¿Eliminar esta tarea?')) return;
  try{
    await sb('planning_tareas','DELETE',null,`?id=eq.${id}`);
    closeM('m-pl');
    LOADED.pl=0;
    loadPlan();
    toast('Eliminada');
  }catch(e){ toast('Error: '+e.message,'err'); }
}

// ════════════════════════════════════════
// VISTA: PROYECTOS (consulta)
// ════════════════════════════════════════
async function loadProy(){
  const m=document.getElementById('main');
  m.innerHTML=`
    <input class="search" id="pr-srch" placeholder="🔍 Buscar proyecto..." oninput="renderProy()">
    <div id="pr-list"><div class="empty">Cargando…</div></div>
  `;
  try{
    await Promise.all([ensureProy(),ensureCli()]);
    LOADED.proy=1;
    renderProy();
  }catch(e){
    document.getElementById('pr-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}
function renderProy(){
  const q=(document.getElementById('pr-srch')?.value||'').toLowerCase().trim();
  let items=PROY||[];
  if(q) items=items.filter(p=>((p.proyecto_id||'')+(p.nombre||'')+(p.direccion||'')).toLowerCase().includes(q));
  const c=document.getElementById('pr-list');
  if(!items.length){ c.innerHTML='<div class="empty">Sin proyectos</div>'; return; }
  c.innerHTML=items.slice(0,200).map(p=>{
    const cli=(CLI||[]).find(x=>x.cliente_id===p.cliente_id);
    return `<details>
      <summary>${esc(p.proyecto_id)} · ${esc(p.nombre||'')}</summary>
      ${cli?`<div class="kv">Cliente: <b>${esc(cli.nombre||'')}</b></div>`:''}
      ${p.direccion?`<div class="kv">Dirección: <b>${esc(p.direccion)}</b></div>`:''}
      ${p.poblacion?`<div class="kv">Población: <b>${esc(p.poblacion)}</b></div>`:''}
      ${p.estado?`<div class="kv">Estado: <b>${esc(p.estado)}</b></div>`:''}
      ${p.fecha_inicio?`<div class="kv">Inicio: <b>${fmtFecha(p.fecha_inicio)}</b></div>`:''}
      ${p.fecha_fin?`<div class="kv">Fin: <b>${fmtFecha(p.fecha_fin)}</b></div>`:''}
      ${p.notas?`<div class="kv">Notas: <b>${esc(p.notas)}</b></div>`:''}
    </details>`;
  }).join('')+(items.length>200?`<div class="empty">Mostrando 200 de ${items.length}. Filtra para ver más.</div>`:'');
}

// ════════════════════════════════════════
// VISTA: CLIENTES (consulta)
// ════════════════════════════════════════
async function loadCli(){
  const m=document.getElementById('main');
  m.innerHTML=`
    <input class="search" id="cl-srch" placeholder="🔍 Buscar cliente..." oninput="renderCli()">
    <div id="cl-list"><div class="empty">Cargando…</div></div>
  `;
  try{
    await ensureCli();
    renderCli();
  }catch(e){
    document.getElementById('cl-list').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}
function renderCli(){
  const q=(document.getElementById('cl-srch')?.value||'').toLowerCase().trim();
  let items=CLI||[];
  if(q) items=items.filter(c=>((c.nombre||'')+(c.email||'')+(c.telefono||'')+(c.nif||'')).toLowerCase().includes(q));
  const c=document.getElementById('cl-list');
  if(!items.length){ c.innerHTML='<div class="empty">Sin clientes</div>'; return; }
  c.innerHTML=items.slice(0,200).map(x=>`
    <details>
      <summary>${esc(x.nombre||'—')}</summary>
      ${x.nif?`<div class="kv">NIF: <b>${esc(x.nif)}</b></div>`:''}
      ${x.telefono?`<div class="kv">Tel: <b><a href="tel:${esc(x.telefono)}" style="color:var(--blue)">${esc(x.telefono)}</a></b></div>`:''}
      ${x.email?`<div class="kv">Email: <b><a href="mailto:${esc(x.email)}" style="color:var(--blue)">${esc(x.email)}</a></b></div>`:''}
      ${x.direccion?`<div class="kv">Dir: <b>${esc(x.direccion)}</b></div>`:''}
      ${x.poblacion?`<div class="kv">Población: <b>${esc(x.poblacion)}</b></div>`:''}
      ${x.notas?`<div class="kv">Notas: <b>${esc(x.notas)}</b></div>`:''}
    </details>
  `).join('')+(items.length>200?`<div class="empty">Mostrando 200 de ${items.length}. Filtra para ver más.</div>`:'');
}

// ── Modales ──
function openM(id){ document.getElementById(id).classList.add('on'); }
function closeM(id){ document.getElementById(id).classList.remove('on'); }

// ── Arranque: si hay usuario en localStorage, entrar directo ──
(function(){
  const u=localStorage.getItem('pau-m-user');
  if(u && PASSWDS[u]) startApp(u);
})();
</script>
